name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "AI Resume Screening System with Tracing/requirements.txt"
      - name: Run tests
        working-directory: "AI Resume Screening System with Tracing"
        run: |
          pip install pytest
          pytest -q
